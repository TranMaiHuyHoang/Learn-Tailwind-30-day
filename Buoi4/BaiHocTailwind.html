<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body >
    <div class="w-[1200px] mx-auto">
        <div class="flex flex-col w-[400px] bg-gray-100 shadow-lg p-5 gap-2 ">
            <img class="rounded-[10px] hover:scale-105 transition-all duration-300"  src="https://image.api.playstation.com/vulcan/ap/rnd/202009/3021/B2aUYFC0qUAkNnjbTHRyhrg3.png " alt="">
            <h3 class="text-blue-500 font-bold"> Iphone 15 Pro Max </h3>
            <div class="flex gap-2"  >
                <span class="text-red-500 font-medium"> 1000$ </span>
                <span class="text-gray-500 font-medium line-through"> 100$ </span>
            </div>

            <div class="flex justify-between">
                <span class="text-yellow-500"> 4.5</span>
                <button class="text-pink-500 py-1 px-3 bg-gray-300 rounded-xl hover:text-gray-700 cursor-pointer"> Yêu Thích</button>

            </div>
        </div>
    </div>

</body>

</html>
