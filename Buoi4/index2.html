<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Layout</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <div class="mx-auto flex items-center justify-between p-5 ">

        <div class="flex gap-5 w-[500px] shadow-xl rounded-2xl p-5">
           <!-- Bên trái là ảnh -->
            <img class="h-[100px] rounded-[10px] hover:scale-105 transition-all duration-300"  src="https://image.api.playstation.com/vulcan/ap/rnd/202009/3021/B2aUYFC0qUAkNnjbTHRyhrg3.png " alt="">

           <!--  Bên phải là nội dung-->
           <div class="flex flex-col flex-1 gap-3">
                <h3 class="text-blue-500 font-bold "> Iphone 15 Pro Max </h3>

                <div class="flex items-center gap-3">
                       <span class="text-red-500 font-medium"> 1000$ </span>
                       <span class="text-gray-500 font-medium line-through"> 100$ </span>
                </div>

                <div class="flex justify-between">
                    <span class=" text-yellow-500 font-bold ">4.5</span>
                    <button class="bg-black text-white py-1 px-3 rounded-xl hover:text-black hover:bg-gray-200 cursor-pointer">Yêu Thích</button>
                </div>
            </div>

        </div>

    </div>

</body>

</html>
